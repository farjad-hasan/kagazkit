name: Publish Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build-n-publish:
    name: Build and publish Python distributions to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install packaging tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine

    - name: Build Python distributions
      run: |
        python -m build --sdist --wheel --outdir dist/

    - name: Validate built artifacts
      run: |
        python -m twine check dist/*

    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  windows-release-assets:
    name: Build Windows release assets
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
        pip install -e .
        pip install pyinstaller

    - name: Build Windows executable
      run: |
        python build_app.py
        if (!(Test-Path dist\KagazKit.exe)) { throw "KagazKit.exe was not generated" }

    - name: Smoke-test packaged executable
      run: |
        python packaged_gui_smoke.py dist\KagazKit.exe

    - name: Generate SHA256 checksum
      shell: pwsh
      run: |
        $hash = (Get-FileHash .\dist\KagazKit.exe -Algorithm SHA256).Hash.ToLower()
        Set-Content -Path .\dist\KagazKit.exe.sha256 -Value "$hash  KagazKit.exe"

    - name: Upload Windows release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-release-assets
        path: |
          dist/KagazKit.exe
          dist/KagazKit.exe.sha256

  publish-github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build-n-publish, windows-release-assets]
    permissions:
      contents: write

    steps:
    - name: Download Windows release artifacts
      uses: actions/download-artifact@v4
      with:
        name: windows-release-assets
        path: release-assets

    - name: Publish GitHub release
      uses: softprops/action-gh-release@v2
      with:
        body_path: .github/release-template.md
        files: |
          release-assets/KagazKit.exe
          release-assets/KagazKit.exe.sha256
