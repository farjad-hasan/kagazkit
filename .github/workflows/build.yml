name: Build and Test

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Install the package in editable mode so tests can find it
        pip install -e .
        # Ensure dev tools are installed even if not in requirements (though they should be)
        pip install pytest ruff

    - name: Lint with ruff
      run: |
        # Run ruff on the src and tests directories
        ruff check .

    - name: Test with pytest
      run: |
        # Run unit tests
        pytest

  package-validation:
    name: Package Validation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install packaging tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine

    - name: Build distributions
      run: |
        python -m build --sdist --wheel --outdir release-dist

    - name: Check built metadata
      run: |
        python -m twine check release-dist/*

    - name: Smoke-test installed wheel
      run: |
        python -m venv wheel-smoke-venv
        source wheel-smoke-venv/bin/activate
        python -m pip install --upgrade pip
        python -m pip install release-dist/*.whl
        python -c "import kagazkit; print(kagazkit.__version__)"

  windows-exe:
    name: Windows EXE Build
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
        pip install -e .
        pip install pyinstaller

    - name: Build Windows executable
      run: |
        python build_app.py
        if (!(Test-Path dist\KagazKit.exe)) { throw "KagazKit.exe was not generated" }

    - name: Smoke-test Windows executable GUI
      run: |
        python packaged_gui_smoke.py dist\KagazKit.exe

    - name: Upload Windows executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: KagazKit-windows-exe
        path: dist/KagazKit.exe

  check:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [test, package-validation, windows-exe]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.test.result }}" != "success" || "${{ needs.package-validation.result }}" != "success" || "${{ needs.windows-exe.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed"
